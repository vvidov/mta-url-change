name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore NuGet packages
      run: nuget restore UrlToTextTransportAgent.Tests.csproj
      
    - name: Build Mock Agent (for testing)
      run: |
        msbuild UrlToTextTransportAgent.Mock.csproj /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU" /verbosity:minimal
        
    - name: Build Test Project
      run: |
        msbuild UrlToTextTransportAgent.Tests.csproj /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU" /verbosity:minimal
        
    - name: Run Unit Tests
      run: |
        # Install VSTest if not available
        dotnet tool install --global dotnet-vstest --version 17.8.0 || true
        
        # Run tests using VSTest
        vstest.console.exe "bin\${{ matrix.configuration }}\UrlToTextTransportAgent.Tests.dll" /logger:trx /ResultsDirectory:TestResults
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.configuration }}
        path: TestResults/*.trx
        
    - name: Build Production Agent (Exchange version)
      run: |
        # This will fail in CI due to missing Exchange dependencies, but validates syntax
        msbuild UrlToTextTransportAgent.csproj /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU" /verbosity:minimal /p:TreatWarningsAsErrors=false /p:WarningLevel=1
      continue-on-error: true
      
    - name: Upload Mock Agent Artifact
      uses: actions/upload-artifact@v4
      with:
        name: url-to-text-agent-mock-${{ matrix.configuration }}
        path: |
          bin/${{ matrix.configuration }}/UrlToTextTransportAgent.Mock.dll
          bin/${{ matrix.configuration }}/UrlToTextTransportAgent.Mock.dll.config
          
  code-analysis:
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2
      
    - name: Run Code Analysis
      run: |
        # Basic code analysis using MSBuild
        msbuild UrlToTextTransportAgent.Mock.csproj /p:Configuration=Debug /p:RunAnalyzersDuringBuild=true /p:TreatWarningsAsErrors=true /verbosity:normal
        
  security-scan:
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Security Scan
      run: |
        # Basic security checks
        Write-Host "Checking for hardcoded secrets..."
        
        # Check for potential secrets in code files
        $suspiciousPatterns = @(
          'password\s*=\s*["\'][^"\']+["\']',
          'key\s*=\s*["\'][^"\']+["\']',
          'secret\s*=\s*["\'][^"\']+["\']',
          'token\s*=\s*["\'][^"\']+["\']'
        )
        
        $foundSecrets = $false
        Get-ChildItem -Path . -Include "*.cs","*.config","*.ps1" -Recurse | ForEach-Object {
          $content = Get-Content $_.FullName -Raw
          foreach ($pattern in $suspiciousPatterns) {
            if ($content -match $pattern) {
              Write-Host "⚠️  Potential secret found in $($_.FullName): $($matches[0])"
              $foundSecrets = $true
            }
          }
        }
        
        if ($foundSecrets) {
          Write-Host "❌ Security scan found potential issues"
          exit 1
        } else {
          Write-Host "✅ Security scan passed"
        }
        
  release-check:
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-and-test, security-scan]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check if release needed
      id: release-check
      run: |
        # Check if version has changed in AssemblyInfo
        $version = Select-String -Path "Properties\AssemblyInfo.cs" -Pattern 'AssemblyVersion\("([^"]+)"\)' | ForEach-Object { $_.Matches[0].Groups[1].Value }
        Write-Host "Current version: $version"
        echo "version=$version" >> $env:GITHUB_OUTPUT
        
        # Check if tag exists
        git fetch --tags
        $tagExists = git tag -l "v$version"
        if ($tagExists) {
          Write-Host "Tag v$version already exists"
          echo "create-release=false" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "New version detected, will create release"
          echo "create-release=true" >> $env:GITHUB_OUTPUT
        }
        
    - name: Create Release
      if: steps.release-check.outputs.create-release == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.release-check.outputs.version }}
        release_name: URL-to-Text Agent v${{ steps.release-check.outputs.version }}
        body: |
          ## URL-to-Text Transport Agent v${{ steps.release-check.outputs.version }}
          
          ### Features
          - Scans external emails and converts URLs to plain text
          - Skips signed and encrypted emails automatically
          - Comprehensive logging with multiple levels
          - Windows Event Log integration
          
          ### Installation
          1. Download the DLL from the assets below
          2. Copy to your Exchange server
          3. Run the installation script as Administrator
          
          ### Files
          - **UrlToTextTransportAgent.dll** - Production agent for Exchange Server
          - **UrlToTextTransportAgent.Mock.dll** - Mock version for testing
          - **Installation Scripts** - PowerShell scripts for easy deployment
          
          See README.md for detailed installation and configuration instructions.
        draft: false
        prerelease: false