name: PowerShell Scripts Test

on:
  push:
    paths:
      - '*.ps1'
      - '.github/workflows/powershell-test.yml'
  pull_request:
    paths:
      - '*.ps1'
  workflow_dispatch:

jobs:
  powershell-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test PowerShell Scripts Syntax
      run: |
        Write-Host "Testing PowerShell script syntax..."
        
        $scripts = Get-ChildItem -Path . -Filter "*.ps1" -Recurse
        $errorCount = 0
        
        foreach ($script in $scripts) {
          Write-Host "Checking $($script.Name)..."
          
          try {
            # Parse the script to check for syntax errors
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $script.FullName -Raw), [ref]$null)
            Write-Host "✅ $($script.Name) - Syntax OK" -ForegroundColor Green
          }
          catch {
            Write-Host "❌ $($script.Name) - Syntax Error: $($_.Exception.Message)" -ForegroundColor Red
            $errorCount++
          }
        }
        
        if ($errorCount -gt 0) {
          Write-Host "Found $errorCount syntax errors"
          exit 1
        } else {
          Write-Host "All PowerShell scripts passed syntax check"
        }
        
    - name: Test Script Parameters
      run: |
        Write-Host "Testing script parameter validation..."
        
        # Test Build-Agent.ps1
        try {
          .\Build-Agent.ps1 -Configuration "InvalidConfig" -WhatIf 2>&1 | Out-Null
          Write-Host "✅ Build-Agent.ps1 parameter handling OK"
        } catch {
          Write-Host "⚠️ Build-Agent.ps1 parameter issue: $($_.Exception.Message)"
        }
        
        # Test Install-Agent.ps1 (dry run)
        try {
          Get-Help .\Install-Agent.ps1 -Parameter AgentDllPath | Out-Null
          Write-Host "✅ Install-Agent.ps1 help documentation OK"
        } catch {
          Write-Host "⚠️ Install-Agent.ps1 help issue: $($_.Exception.Message)"
        }
        
        Write-Host "Script parameter testing completed"
        
    - name: Test Mock Installation (Dry Run)
      run: |
        Write-Host "Testing mock installation process..."
        
        # Create mock Exchange Management Shell environment
        function Add-PSSnapin { param($Name) Write-Host "Mock: Adding snapin $Name" }
        function Install-TransportAgent { 
          param($Name, $TransportAgentFactory, $AssemblyPath)
          Write-Host "Mock: Installing agent $Name from $AssemblyPath"
        }
        function Enable-TransportAgent { 
          param($Identity)
          Write-Host "Mock: Enabling agent $Identity"
        }
        function Get-TransportAgent { 
          param($Identity)
          return @{ Name = $Identity; Enabled = $true; Priority = 1 }
        }
        
        # Test if installation script would work
        try {
          Write-Host "Simulating agent installation..."
          
          # Build mock agent first
          msbuild UrlToTextTransportAgent.Mock.csproj /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
          
          if (Test-Path "bin\Release\UrlToTextTransportAgent.Mock.dll") {
            Write-Host "✅ Mock DLL built successfully"
            
            # Test deployment script logic (without actually installing)
            $mockDllPath = "bin\Release\UrlToTextTransportAgent.Mock.dll"
            Write-Host "Mock installation would use DLL: $mockDllPath"
            Write-Host "✅ Mock installation test passed"
          } else {
            Write-Host "❌ Mock DLL not found after build"
            exit 1
          }
        } catch {
          Write-Host "❌ Mock installation test failed: $($_.Exception.Message)"
          exit 1
        }
        
    - name: Validate Configuration Files
      run: |
        Write-Host "Validating configuration files..."
        
        # Test App.config XML structure
        try {
          [xml]$config = Get-Content "App.config"
          Write-Host "✅ App.config is valid XML"
          
          # Check required settings
          $requiredSettings = @(
            "InternalDomains",
            "LogFilePath", 
            "EnableLogging",
            "SkipSignedEmails",
            "SkipEncryptedEmails"
          )
          
          foreach ($setting in $requiredSettings) {
            $node = $config.configuration.appSettings.add | Where-Object { $_.key -eq $setting }
            if ($node) {
              Write-Host "✅ Found required setting: $setting = $($node.value)"
            } else {
              Write-Host "❌ Missing required setting: $setting"
              exit 1
            }
          }
          
          Write-Host "✅ All required configuration settings found"
          
        } catch {
          Write-Host "❌ App.config validation failed: $($_.Exception.Message)"
          exit 1
        }
        
        Write-Host "Configuration validation completed"